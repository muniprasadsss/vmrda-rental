<app-header></app-header>
<app-dashboard></app-dashboard>
<div class="card custom-table">
    <p-table>
        <ng-template pTemplate="caption">

            <div class="searchbar">
                <div class="search">
                    <p-iconField iconPosition="left" class="ml-auto">
                        <p-inputIcon>
                            <i class="pi pi-search"></i>
                        </p-inputIcon>
                        <input pInputText type="text" placeholder="Search keyword" />
                    </p-iconField>
                </div>
                <div class="dialog">
                    <p-button 
                    (onClick)="showDialog()" 
                    label="Add New" 
                    severity="success"
                    size="small" />
                    <p-dialog 
    header="Add New" 
    [modal]="true"
    [(visible)]="visible" 
    position="center" 
    [style]="{ width: '50rem' }">
    <div class="form-container">
        <div class="form-row">
          <div class="form-group">
            <label for="bill-no" class="form-label">Bill No</label>
            <input type="text" id="bill-no" class="form-input" />
          </div>
          <div class="form-group">
            <label for="user-id" class="form-label">User Id</label>
            <input type="text" id="user-id" class="form-input" />
          </div>
        </div>
      
        <div class="form-row">
          <div class="form-group">
            <label for="property-code" class="form-label">Property Code</label>
            <input type="text" id="property-code" class="form-input" />
          </div>
          <div class="form-group">
            <label for="rental-period" class="form-label">Rental Period</label>
            <input type="text" id="rental-period" class="form-input" />
          </div>
        </div>
      
        <div class="form-row">
          <div class="form-group">
            <label for="rental-amount" class="form-label">Rental Amount</label>
            <input type="number" id="rental-amount" class="form-input" step="0.01" />
          </div>
          <div class="form-group">
            <label for="gst" class="form-label">GST</label>
            <input type="number" id="gst" class="form-input" step="0.01" />
          </div>
        </div>
      
        <div class="form-row">
          <div class="form-group">
            <label for="rental-interest" class="form-label">Rental Interest</label>
            <input type="number" id="rental-interest" class="form-input" step="0.01" />
          </div>
          <div class="form-group">
            <label for="gst-interest" class="form-label">GST Interest</label>
            <input type="number" id="gst-interest" class="form-input" step="0.01" />
          </div>
        </div>
      
        <div class="form-row">
          <div class="form-group">
            <label for="power-bill-amount" class="form-label">Power Bill Amount</label>
            <input type="number" id="power-bill-amount" class="form-input" step="0.01" />
          </div>
          <div class="form-group">
            <label for="water-bill-amount" class="form-label">Water Bill Amount</label>
            <input type="number" id="water-bill-amount" class="form-input" step="0.01" />
          </div>
        </div>
      
        <div class="form-row">
          <div class="form-group">
            <label for="maintenance-amount" class="form-label">Maintenance Amount</label>
            <input type="number" id="maintenance-amount" class="form-input" step="0.01" />
          </div>
          <div class="form-group">
            <label for="total-amount" class="form-label">Total Amount</label>
            <input type="number" id="total-amount" class="form-input" step="0.01" />
          </div>
        </div>
      
        <div class="form-row">
          <div class="form-group">
            <label for="total-due" class="form-label">Total Due</label>
            <input type="number" id="total-due" class="form-input" step="0.01" />
          </div>
        </div>
      </div>
      
    <div class="btn">
        <div class="save">
            <p-button label="Save" (onClick)="visible = false" size="small"/>
        </div>
        <div class="cancel">
            <p-button label="Cancel" severity="danger" (onClick)="visible = false" size="small"/>
        </div>
    </div>
                   </p-dialog>

                </div>

            </div>


            <!-- <div class="flex">
                <p-iconField iconPosition="left" class="ml-auto">
                    <p-inputIcon>
                        <i class="pi pi-search"></i>
                    </p-inputIcon>
                    <input pInputText type="text" placeholder="Search keyword" />
                </p-iconField>
                <p-button 
                    (onClick)="showDialog()" 
                    label="Add New Bill" 
                    severity="success"
                    size="small" />
            </div> -->


        </ng-template>
        <ng-template pTemplate="header">
            <tr style="font-size: 12px; padding: 0;">
                <th pSortableColumn="S_No">S No<p-sortIcon field="S_No" /></th>
                <th pSortableColumn="bill_no">Bill No<p-sortIcon field="bill_no" /></th>
                <th pSortableColumn="user_id">User Id<p-sortIcon field="user_id" /></th>
                <th pSortableColumn="property_code">Property Code<p-sortIcon field="property_code" /></th>
                <th pSortableColumn="rental_period">Rental Period<p-sortIcon field="rental_period" /></th>
                <th pSortableColumn="rental_amount">Rental Amount<p-sortIcon field="rental_amount" /></th>
                <th pSortableColumn="gst">GST<p-sortIcon field="gst" /></th>
                <th pSortableColumn="rental_intrest">Rental Interest<p-sortIcon field="rental_intrest" /></th>
                <th pSortableColumn="gst_intrest">GST Interest<p-sortIcon field="gst_intrest" /></th>
                <th pSortableColumn="power_bill_amount">Power Bill Amount<p-sortIcon field="power_bill_amount" /></th>
                <th pSortableColumn="water_bill_amount">Water Bill Amount<p-sortIcon field="water_bill_amount" /></th>
                <th pSortableColumn="maintenance_amount">Maintenance Amount<p-sortIcon field="maintenance_amount" /></th>
                <th pSortableColumn="total_amount">Total Amount<p-sortIcon field="total_amount" /></th>
                <th pSortableColumn="total_due">Total Due<p-sortIcon field="total_due" /></th>
                <th pSortableColumn="status">Status<p-sortIcon field="status" /></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr style="margin-bottom: 1rem;">
                <td colspan="15">No data found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Modal for Add/Edit -->


<app-footer></app-footer>
