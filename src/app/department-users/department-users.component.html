<div class="content">
  <div class="card" style="margin: 2rem;">
    <p-table #dt2 [value]="dataSource" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]"
        [paginator]="true" [globalFilterFields]="['S_No', 'User_ID', 'User_Name', 'Mobile_No', 'Nature_of_Business', 'Aadhaar_No', 'PAN_No', 'Email_Id', 'GSTIN', 'Revenue_Dvision']"
        [tableStyle]="{ 'min-width': '75rem' }" styleClass="p-datatable-striped">
      <ng-template pTemplate="caption">
        <div class="searchbar">
          <div class="search">
            <p-iconField iconPosition="left" class="ml-auto">
              <p-inputIcon>
                <i class="pi pi-search"></i>
              </p-inputIcon>
              <input pInputText type="text" (input)="onFilterGlobal($event)" placeholder="Search keyword" />
            </p-iconField>
          </div>
          <div class="dialog">
            <p-button 
                (onClick)="showAddDialog()" 
                label="Add New" 
                severity="success"
                size="small" />
            <p-dialog 
                header="Add New" 
                [modal]="true"
                [(visible)]="visible" 
                position="center" 
                [style]="{ width: '50rem' }">
              <div class="form-container">
                <!-- Add form fields here -->
                <div class="form-row">
                  <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" [(ngModel)]="formData.username" class="form-input" />
                  </div>
                  <div class="form-group">
                    <label for="mobile" class="form-label">Mobile No</label>
                    <input type="number" id="mobile" [(ngModel)]="formData.mobile" class="form-input" />
                  </div>
                </div>
                <div class="form-row"></div>
                  <div class="form-group">
                    <label for="usertype" class="form-label">UserType</label>
                    <input type="text" id="usertype" [(ngModel)]="formData.username" class="form-input" />
                  </div>
                  <div class="form-group">
                    <label for="revenuedivision" class="form-label">Revenue Division</label>
                    <input type="text" id="revenuedivision" [(ngModel)]="formData.mobile" class="form-input" />
                  </div>
                </div>
                <!-- More form rows -->
                <div class="btn">
                  <p-button label="Save" (onClick)="saveUser()" size="small"/>
                  <p-button label="Cancel" severity="danger" (onClick)="visible = false" size="small"/>
                </div>
            </p-dialog>
          </div>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr style="font-size: 12px;">
          <th pSortableColumn="SL_NO">S.No <p-sortIcon field="SL_NO" /></th>
          <th pSortableColumn="USER_ID">User ID <p-sortIcon field="USER_ID" /></th>
          <th pSortableColumn="USER_NAME">User Name<p-sortIcon field="USER_NAME" /></th>
          <th pSortableColumn="MOBILE_NUM">Mobile No<p-sortIcon field="MOBILE_NUM" /></th>
          <th pSortableColumn="user_type">User Type<p-sortIcon field="user_type" /></th>
          <th pSortableColumn="Revenue_Dvision">Revenue Division<p-sortIcon field="Revenue_Dvision" /></th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-customer>
        <tr style="font-size: 12px;">
          <td style="width: 6%;">{{ customer.SL_NO }}</td>
          <td style="width: 7%;">{{ customer.USER_ID }}</td>
          <td style="width: 6%;">{{ customer.USER_NAME }}</td>
          <td style="width: 8%;">{{ customer.MOBILE_NUM }}</td>
          <td style="width: 6%;">{{ customer.USER_TYPE }}</td>
          <td style="width: 6%;">{{ customer.REVENUE_DIVISION }}</td>
          <td style="width: 6%;">
            <div class="rowbtn">
              <button class="editButton" (click)="showEditDialog(customer)"> <i class="pi pi-pencil"></i></button>
              <button class="deleteButton"><i class="pi pi-trash"></i></button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- Edit Dialog -->
<p-dialog 
    header="Edit User" 
    [modal]="true"
    [(visible)]="editVisible" 
    position="center" 
    [style]="{ width: '50rem' }">
  <div class="form-container">
    <div class="form-row">
      <div class="form-group">
        <label for="userid" class="form-label">User ID</label>
        <input type="text" id="userid" class="form-input" disabled/>
      </div>
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-input" disabled/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="mobileNo" class="form-label">Mobile No</label>
        <input type="number" id="mobileNo"  class="form-input" />
      </div>
      <div class="form-group">
        <label for="usertype" class="form-label">User Type</label>
        <input type="text" id="usertype"  class="form-input" />
      </div>
    </div> 
    <div class="form-row">
      <div class="form-group">
        <label for="revenuedivision" class="form-label">Revenue Division</label>
        <input type="text" id="revenuedivision"  class="form-input" />
      </div>
    </div>
    <!-- More form rows -->
    <div class="btn">
      <p-button label="Update" (onClick)="updateUser()" size="small"/>
      <p-button label="Cancel" severity="danger" (onClick)="editVisible = false" size="small"/>
    </div>
  </div>
</p-dialog>
