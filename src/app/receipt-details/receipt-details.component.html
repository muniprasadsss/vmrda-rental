<app-header></app-header>
<app-dashboard></app-dashboard>
<div class="card custom-table">
    <p-table>
        <ng-template pTemplate="caption">
            <div class="flex">
                <p-iconField iconPosition="left" class="ml-auto">
                    <p-inputIcon>
                        <i class="pi pi-search"></i>
                    </p-inputIcon>
                    <input pInputText type="text" placeholder="Search keyword" />
                </p-iconField>
                <p-button 
                    (onClick)="showDialog()" 
                    label="Add New Bill" 
                    severity="success"
                    size="small" />
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr style="font-size: 12px; padding: 0;">
                <th pSortableColumn="S_No">S No<p-sortIcon field="S_No" /></th>
                <th pSortableColumn="bill_no">Bill No<p-sortIcon field="bill_no" /></th>
                <th pSortableColumn="user_id">User Id<p-sortIcon field="user_id" /></th>
                <th pSortableColumn="property">Property<p-sortIcon field="property" /></th>
                <th pSortableColumn="rental_period">Rental Period<p-sortIcon field="rental_period" /></th>
                <th pSortableColumn="rental_amount">Rental Amount<p-sortIcon field="rental_amount" /></th>
                <th pSortableColumn="gst">GST<p-sortIcon field="gst" /></th>
                <th pSortableColumn="rental_intrest">Rental Interest<p-sortIcon field="rental_intrest" /></th>
                <th pSortableColumn="gst_intrest">GST Interest<p-sortIcon field="gst_intrest" /></th>
                <th pSortableColumn="power_bill_amount">Power Bill Amount<p-sortIcon field="power_bill_amount" /></th>
                <th pSortableColumn="water_bill_amount">Water Bill Amount<p-sortIcon field="water_bill_amount" /></th>
                <th pSortableColumn="maintenance_amount">Maintenance Amount<p-sortIcon field="maintenance_amount" /></th>
                <th pSortableColumn="total_amount">Total Amount<p-sortIcon field="total_amount" /></th>
                <th pSortableColumn="total_due">Total Due<p-sortIcon field="total_due" /></th>
                <th pSortableColumn="status">Status<p-sortIcon field="status" /></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr style="margin-bottom: 1rem;">
                <td colspan="15">No data found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Modal for Add/Edit -->
<p-dialog 
    header="Add/Edit Bill" 
    [modal]="true"
    [(visible)]="visible" 
    position="center" 
    [style]="{ width: '50rem' }">
    <div class="form-container">
        <div class="form-row">
            <div class="form-group">
                <label for="billNo" class="form-label">Bill No</label>
                <input type="text" id="billNo" class="form-input" />
            </div>
            <div class="form-group">
                <label for="userId" class="form-label">User Id</label>
                <input type="text" id="userId" class="form-input" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="property" class="form-label">Property</label>
                <input type="text" id="property" class="form-input" />
            </div>
            <div class="form-group">
                <label for="rentalPeriod" class="form-label">Rental Period</label>
                <input type="text" id="rentalPeriod" class="form-input" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="rentalAmount" class="form-label">Rental Amount</label>
                <input type="text" id="rentalAmount" class="form-input" />
            </div>
            <div class="form-group">
                <label for="gst" class="form-label">GST</label>
                <input type="text" id="gst" class="form-input" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="rentalIntrest" class="form-label">Rental Interest</label>
                <input type="text" id="rentalIntrest" class="form-input" />
            </div>
            <div class="form-group">
                <label for="gstIntrest" class="form-label">GST Interest</label>
                <input type="text" id="gstIntrest" class="form-input" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="powerBillAmount" class="form-label">Power Bill Amount</label>
                <input type="text" id="powerBillAmount" class="form-input" />
            </div>
            <div class="form-group">
                <label for="waterBillAmount" class="form-label">Water Bill Amount</label>
                <input type="text" id="waterBillAmount" class="form-input" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="maintenanceAmount" class="form-label">Maintenance Amount</label>
                <input type="text" id="maintenanceAmount" class="form-input" />
            </div>
            <div class="form-group">
                <label for="totalAmount" class="form-label">Total Amount</label>
                <input type="text" id="totalAmount" class="form-input" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="totalDue" class="form-label">Total Due</label>
                <input type="text" id="totalDue" class="form-input" />
            </div>
            <div class="form-group">
                <label for="status" class="form-label">Status</label>
                <input type="text" id="status" class="form-input" />
            </div>
        </div>

        <div class="btn">
            <div class="save">
                <p-button label="Save" (onClick)="visible = false" size="small"/>
            </div>
            <div class="cancel">
                <p-button label="Cancel" severity="danger" (onClick)="visible = false" size="small"/>
            </div>
        </div>
    </div>
</p-dialog>

<app-footer></app-footer>
