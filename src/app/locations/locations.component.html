<app-header></app-header>
<app-dashboard></app-dashboard>
<div class="card custom-table">
    <p-table>
        <ng-template pTemplate="caption">
            <div class="flex">
                <p-iconField iconPosition="left" class="ml-auto">
                    <p-inputIcon>
                        <i class="pi pi-search"></i>
                    </p-inputIcon>
                    <input pInputText type="text" placeholder="Search keyword" />
                </p-iconField>
                <p-button 
                    (onClick)="showDialog()" 
                    label="Add New" 
                    severity="success"
                    size="small" />
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr style="font-size: 12px; padding: 0;">
                <th pSortableColumn="S_No">S No <p-sortIcon field="S_No" /></th>
                <th pSortableColumn="location_name">Location Name<p-sortIcon field="location_name" /></th>
                <th pSortableColumn="location_code">Location Code<p-sortIcon field="location_code" /></th>
                <th pSortableColumn="no_of_complexes">No of Complexes<p-sortIcon field="no_of_complexes" /></th>
                <th pSortableColumn="no_of_individual_Shops">No of Individual Shops<p-sortIcon field="no_of_individual_Shops" /></th>
                <th pSortableColumn="total_no_of_shops">Total No Of Shops<p-sortIcon field="total_no_of_shops" /></th>
                <th pSortableColumn="District">District<p-sortIcon field="District" /></th>
                <th pSortableColumn="city">City<p-sortIcon field="city" /></th>
                <th pSortableColumn="place">Place<p-sortIcon field="place" /></th>
                <th pSortableColumn="map_location">Map Location<p-sortIcon field="map_location" /></th>
                <th pSortableColumn="revenue_division">Revenue Division<p-sortIcon field="revenue_division" /></th>
                <th pSortableColumn="ri_name">RI Name<p-sortIcon field="ri_name" /></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr style="margin-bottom: 1rem;">
                <td colspan="12">No data found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Modal for Add/Edit -->
<p-dialog 
    header="Edit Details" 
    [modal]="true"
    [(visible)]="visible" 
    position="center" 
    [style]="{ width: '50rem' }">
    <div class="form-container">
        <div class="form-row">
            <div class="form-group">
                <label for="locationName" class="form-label">Location Name</label>
                <input type="text" id="locationName" class="form-input" />
            </div>
            <div class="form-group">
                <label for="locationCode" class="form-label">Location Code</label>
                <input type="text" id="locationCode" class="form-input" />
            </div>
        </div>
      
        <div class="form-row">
            <div class="form-group">
                <label for="noOfComplexes" class="form-label">No of Complexes</label>
                <input type="number" id="noOfComplexes" class="form-input" />
            </div>
            <div class="form-group">
                <label for="noOfIndividualShops" class="form-label">No of Individual Shops</label>
                <input type="number" id="noOfIndividualShops" class="form-input" />
            </div>
        </div>
      
        <div class="form-row">
            <div class="form-group">
                <label for="totalNoOfShops" class="form-label">Total No Of Shops</label>
                <input type="number" id="totalNoOfShops" class="form-input" />
            </div>
        </div>
      
        <div class="form-row">
            <div class="form-group">
                <label for="district" class="form-label">District</label>
                <input type="text" id="district" class="form-input" />
            </div>
            <div class="form-group">
                <label for="city" class="form-label">City</label>
                <input type="text" id="city" class="form-input" />
            </div>
        </div>
      
        <div class="form-row">
            <div class="form-group">
                <label for="place" class="form-label">Place</label>
                <input type="text" id="place" class="form-input" />
            </div>
            <div class="form-group">
                <label for="mapLocation" class="form-label">Map Location</label>
                <input type="text" id="mapLocation" class="form-input" />
            </div>
        </div>
      
        <div class="form-row">
            <div class="form-group">
                <label for="revenueDivision" class="form-label">Revenue Division</label>
                <input type="text" id="revenueDivision" class="form-input" />
            </div>
            <div class="form-group">
                <label for="riName" class="form-label">RI Name</label>
                <input type="text" id="riName" class="form-input" />
            </div>
        </div>
      
        <div class="btn">
            <div class="save">
                <p-button label="Save" (onClick)="visible = false" size="small"/>
            </div>
            <div class="save">
                <p-button label="Cancel" severity="danger" (onClick)="visible = false" size="small"/>
            </div>
        </div>
    </div>
</p-dialog>

<app-footer></app-footer>
