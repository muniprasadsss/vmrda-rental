<div class="card custom-table">
    <p-table>
        <ng-template pTemplate="caption">
            <div class="flex">
                <p-iconField iconPosition="left" class="ml-auto">
                    <p-inputIcon>
                        <i class="pi pi-search"></i>
                    </p-inputIcon>
                    <input pInputText type="text"  placeholder="Search keyword" />
                </p-iconField>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr style="font-size: 12px; padding: 0;">
                <th pSortableColumn="S_No" >S No<p-sortIcon field="S_No" /></th>
                <th pSortableColumn="user_id">User Id<p-sortIcon field="user_id" /></th>
                <th pSortableColumn="property_code">Property code<p-sortIcon field="property_code" /></th>
                <th pSortableColumn="start_date">Start Date<p-sortIcon field="start_date" /></th>
                <th pSortableColumn="end_Date">End Date<p-sortIcon field="end_Date" /></th>
                <th pSortableColumn="rental_lease">Rental Lease<p-sortIcon field="rental_lease" /></th>
                <th pSortableColumn="enhancement_tenure">Enhancement Tenure<p-sortIcon field="enhancement_tenure" /></th>
                <th pSortableColumn="enhancement_percentage">Enhancement%<p-sortIcon field="enhancement_percentage" /></th>
                <th pSortableColumn="gst_percentage">GST%<p-sortIcon field="gst_percentage" /></th>
                <th pSortableColumn="rental_intrest_percentage">Rental Intrest%<p-sortIcon field="rental_intrest_percentage" /></th>
                <th pSortableColumn="gst_intrest_percentage">GST Intrest%<p-sortIcon field="gst_intrest_percentage" /></th>
                <th pSortableColumn="lease_deed_no">Lease Deed Number<p-sortIcon field="lease_deed_no" /></th>
                <th pSortableColumn="power_meter_number">Power Meter Number<p-sortIcon field="power_meter_number" /></th>
                <th pSortableColumn="water_meter_number">Water Meter Number<p-sortIcon field="water_meter_number" /></th>
                <th pSortableColumn="maintenance_amount">Maintenance Amount<p-sortIcon field="maintenance_amount" /></th>
            </tr>
        </ng-template>
        <!-- <ng-template pTemplate="body" let-customer >
            <tr style="font-size: 12px;">
                <td style="width: 6%;">{{ customer.S_No }}</td>
                <td style="width: 10%;">{{ customer.Complex_Code }}</td>
                <td style="width: 15%;">{{ customer.Complex_Name }}</td>
                <td style="width: 10%;">{{ customer.District }}</td>
                <td style="width: 10%;">{{ customer.Map_Location }}</td>
                <td style="width: 10%;">{{ customer.Place }}</td>
                <td style="width: 10%;">{{ customer.RI_Name }}</td>
                <td style="width: 12%;">{{ customer.Revenue_Division }}</td>
                
            </tr>
        </ng-template> -->
    
        <ng-template pTemplate="emptymessage">
            <tr style="margin-bottom: 1rem;">
                <td colspan="8">No data found.</td>
            </tr>
        </ng-template>
  
    </p-table>
</div>
