version: 0.0
os: linux

files:
  - source: frontend/dist/
    destination: /var/www/html/

permissions:
  - object: /var/www/html
    owner: www-data
    group: www-data
    mode: 755
    type:
      - directory

hooks:
  BeforeInstall:
    - location: /scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: /scripts/deploy.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: /scripts/start_server.sh
      timeout: 300
      runas: root
