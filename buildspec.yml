version: 0.2
phases:
  install:
    commands:
      - echo Installing dependencies...
      - npm install # Install Node.js dependencies
      - npm install -g @angular/cli # Install Angular CLI globally
      - cd frontend && npm install # Install Angular dependencies
  build:
    commands:
      - echo Building Angular app...
      - cd frontend && ng build --prod # Build Angular app for production
  post_build:
    commands:
      - echo Angular build completed.
artifacts:
  files:
    - '**/*'
    - '!node_modules/**/*'
  discard-paths: yes
  base-directory: 'frontend/dist' # Angular's dist folder
  name: angular-artifacts.zip
