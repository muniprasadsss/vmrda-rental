version: 0.2

phases:
  install:
    commands:
      - echo "Current user: $(whoami)"
      - echo "Before chown - Listing files in frontend directory:"
      - ls -l frontend
      - sudo chown -R $(whoami) frontend
      - echo "After chown - Listing files in frontend directory:"
      - ls -l frontend
      - cd frontend && npm install

  build:
    commands:
      - echo "Building Angular app..."
      - cd frontend && ng build --prod

  post_build:
    commands:
      - echo "Angular build completed."

artifacts:
  files:
    - '**/*'
    - '!node_modules/**/*'
  discard-paths: yes
  base-directory: 'frontend/dist'
  name: angular-artifacts.zip