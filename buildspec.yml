# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22.12.0
    commands:
      - echo Installing Mocha...
  pre_build:
    commands:
      - apt-get install build-essential
      - echo Installing source NPM dependencies...
      - cd frontend
      - npm i yarn -g
      - yarn add bcrypt-nodejs
      - yarn install
      - echo installing angular at global
      - node -v
      - npm -v
  build:
    commands:
      - echo pwd
      - pwd
      - echo Build started on `date`
      - npx ng build
artifacts:
  files:
    - 'frontend/dist/vmrda/browser/**/*'
    - 'appspec.yml'
    - 'scripts/**/*'
    - 'frontend/runpp.sh'
    - 'frontend/node_modules/**/*'
    

# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 12
      python: 3.8
    commands:
      - echo Installing Mocha...
  pre_build:  # Ensure this is compatible with your Angular version
    commands:
      - echo "Node.js version:"
      - node -v  # Log Node version to verify
      - echo "npm version:"
      - npm -v  # Log npm version to verify
      - echo "Listing files in the directory:"
      - ls -alh  # List files in the current directory for visibility
      - echo "Installing dependencies..."
      - npm install  # Try without sudo
  build:
    commands:
      - echo "Building the Angular frontend..."
      - cd frontend
      - ng build --configuration production

  post_build:
    commands:
      - echo "Post build steps"
      - cd frontend/dist

artifacts:
  files:
    - frontend/dist/**/*  # Ensure that CodeBuild knows where to find the build artifacts
