version: 0.2
phases:
  install:
    commands:
      - echo Installing dependencies...
      - sudo chown -R $(whoami) frontend # Fixing permission issues
      - cd frontend
      - echo Installing Angular CLI globally...
      - npm install -g @angular/cli
      - echo Installing Angular project dependencies...
      - npm install # Install dependencies for the frontend
  build:
    commands:
      - echo Building Angular app...
      - ng build --prod # Build Angular app for production
  post_build:
    commands:
      - echo Angular build completed.
artifacts:
  files:
    - '**/*'
    - '!node_modules/**/*'
  discard-paths: yes
  base-directory: 'frontend/dist' # Angular's dist folder (adjust if necessary)
  name: angular-artifacts.zip
