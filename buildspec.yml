version: 0.2
phases:
  install:
    commands:
      - echo Installing Angular dependencies...
      - npm install # Install Angular dependencies
  build:
    commands:
      - echo Building Angular app...
      - ng build  # Build Angular app for production
  post_build:
    commands:
      - echo Angular build completed.
artifacts:
  files:
    - '**/*'
    - '!node_modules/**/*'
  discard-paths: yes
  base-directory: 'dist' # Angular's dist folder
  name: angular-artifacts.zip
