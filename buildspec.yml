version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - sudo apt update && sudo apt install -y nginx
      - curl -sL https://deb.nodesource.com/setup_20.x | sudo -E bash -
      - sudo apt install -y nodejs

  build:
    commands:
      - echo "Building frontend..."
      - cd /var/www/html
      - npm install && npm run build
      - echo "Building backend..."
      - cd ../var/www/html/backend
      - npm install

  post_build:
    commands:
      - echo "Deploying application to EC2..."
      - aws s3 cp frontend/dist s3://gitlab-codepipeline-artifacts-mumbai/frontend --recursive
      - aws s3 cp backend s3://gitlab-codepipeline-artifacts-mumbai/backend --recursive

artifacts:
  files:
    - '**/*'
  discard-paths: yes
  base-directory: dist/
