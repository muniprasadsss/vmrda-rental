version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm install -g @angular/cli
      - cd frontend && npm install

  build:
    commands:
      - echo "Building frontend..."
      - cd frontend && ng build --configuration=production --output-path=dist

  post_build:
    commands:
      - echo "Creating deployment package..."
      - cd frontend/dist
      - zip -r ../../frontend.zip .
      - cd ../..

artifacts:
  files:
    - frontend.zip
  discard-paths: yes
