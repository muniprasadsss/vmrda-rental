version: 0.2

phases:
  install:
    commands:
      - echo "Installing dependencies..."
      # - apt update -y
      # - apt install -y awscli
  pre_build:
    commands:
      - echo "Verifying AWS CLI..."
      - aws --version
      - aws s3 ls s3://vmrda-build/artifacts/ || echo "S3 access denied!"
  build:
    commands:
      - echo "Building project..."
      - rm -rf node_modules
      - rm -f package-lock.json
      - npm install --legacy-peer-deps
      - npm run build
      - echo "Checking if dist directory is created..."
      - ls -la dist/
  post_build:
    commands:
      - echo "Deploying to S3..."
      - if [ -d "dist" ]; then aws s3 sync dist/ s3://vmrda-build/artifacts/ --delete; else echo "No dist folder, skipping upload."; fi
      - echo "Deployment complete."

artifacts:
  files:
    - '**/*'
  discard-paths: yes
  base-directory: dist/
