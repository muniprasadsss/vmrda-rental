version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20  # Ensure this is compatible with your Angular version
    commands:
      - echo "Installing dependencies..."
      - npm install  # Avoid sudo, run as the default user in CodeBuild

  build:
    commands:
      - echo "Building the Angular frontend..."
      - cd frontend
      - ng build --configuration=production --output-path=dist

  post_build:
    commands:
      - echo "Post build steps"
      - cd frontend/dist

artifacts:
  files:
    - frontend/dist/**/*  # Ensure correct output path
