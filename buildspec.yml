# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20  # Ensure this is compatible with your Angular version
    commands:
      - echo "Node.js version:"
      - node -v  # Log Node version to verify
      - echo "npm version:"
      - npm -v  # Log npm version to verify
      - echo "Listing files in the directory:"
      - ls -alh  # List files in the current directory for visibility
      - echo "Installing dependencies..."
      - npm install  # Try without sudo
  build:
    commands:
      - echo "Building the Angular frontend..."
      - cd frontend
      - ng build --configuration=production --output-path=dist

  post_build:
    commands:
      - echo "Post build steps"
      - cd frontend/dist

artifacts:
  files:
    - frontend/dist/**/*  # Ensure that CodeBuild knows where to find the build artifacts
